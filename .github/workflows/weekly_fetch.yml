name: 週次論文自動収集・デプロイ

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: python3 scripts/fetch_papers.py

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add data/papers.json
          git diff --staged --quiet || git commit -m "📚 週次論文更新: $(date +'%Y-%m-%d')"
          git push
